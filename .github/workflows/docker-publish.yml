
name: Docker Build and Push

on:
  push:
    branches: [ main ]     
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io 
  IMAGE_NAME: ayuugoyal/mcp-remote-server  

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
      
      - name: Run tests
        run: |
          pytest tests/ -v --cov=src --cov-report=term
      
      - name: Upload test results
        if: always() 
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: |
            .coverage
            coverage.xml


  build:
    name: Build and Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    
    if: github.event_name != 'pull_request'
    
    permissions:
      contents: read 
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch                    # Branch name (main)
            type=semver,pattern={{version}}          # Version (1.0.0)
            type=semver,pattern={{major}}.{{minor}}  # Version (1.0)
            type=semver,pattern={{major}}            # Version (1)
            type=raw,value=latest,enable={{is_default_branch}}  # Latest tag
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test Docker image
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            python -c "import src.server; print('✅ Docker image works!')"
      
      - name: Image published successfully
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Docker image published successfully!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📦 Pull your image with:"
          echo "   docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "🚀 Run your image with:"
          echo "   docker run -it --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "🌐 View on Docker Hub:"
          echo "   https://hub.docker.com/r/${{ env.IMAGE_NAME }}"
          echo ""
